<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blind Rank Game</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#000014,#001a26,#0a0020,#001a26);
  color: #00ffff; /* cyan accent for general text */
  text-align: center;
  margin: 0;
  padding: 30px;
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
}

@keyframes gradientBG {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

h1 {
  font-size: 36px;
  margin-bottom: 15px;
  color: #ff77ff; /* pink accent for the title */
  text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
}

.game-buttons a {
  margin: 5px;
}

button {
  margin: 10px;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(45deg, #00ffff, #ff77ff);
  color: #001a26;
  font-weight: bold;
  transition: all 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

#card {
  background: white;
  color: #001a26;
  padding: 40px;
  border-radius: 20px;
  font-size: 28px;
  margin: 20px auto;
  width: 350px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  text-shadow: none;
  transition: transform 0.2s;
}

#card:hover {
  transform: scale(1.05);
}

#rankings {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.slot {
  background: white;
  color: #001a26;
  border: 2px dashed #001a26;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  text-align: center;
}

.slot:hover {
  background: #00ffff;
  color: #001a26;
  transform: scale(1.05);
}

.slot.filled {
  background: #ff77ff;
  color: white;
  border: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

#progress {
  margin-top: 15px;
  opacity: 0.9;
  font-size: 18px;
  color: #00ffff;
}
</style>
</head>

<body>

<h1>Blind Rank Game</h1>

<div class="game-buttons">
  <a href="?game=work"><button>RMS Hunks</button></a>
  <a href="?game=tvshows"><button>Janets Faves</button></a>
  <a href="?game=movies"><button>Movie Classics</button></a>
</div>

<p>Rank each name before seeing the next one</p>

<div id="card"></div>
<div id="rankings"></div>
<div id="progress"></div>

<button onclick="restart()">Restart</button>
<button onclick="shareResult()">Share Result</button>

<script>
let games = {
  work: ["Matty Wright","David Jones","Jack Cochrane", "Simon Moat","Peter Clark","James Reay","Brian Johnson","Kevin Stobbart","Matthew Scott","Bruce Walker","Tony Jiminez","Michael Storey","Jack Raine","Alistair Bowman","Ash Bughio","Jamie Duprey","Mark Lynskey","Michael Fox","Gordon Bird","Chris Fairbairn","Alan Reddy","Andrew Toes","George Smith"],
  tvshows: ["Matty Wright","David Jones","Jack Cochrane", "Simon Moat","Peter Clark","James Reay","Brian Johnson","Kevin Stobbart","Matthew Scott","Bruce Walker","Tony Jiminez","Michael Storey","Jack Raine","Alistair Bowman","Ash Bughio","Jamie Duprey","Mark Lynskey","Michael Fox","Gordon Bird","Chris Fairbairn","Alan Reddy","Andrew Toes","George Smith","David Machin","Tiegan Butler","Maureen Seaton","Lorraine Paul","Hayley Mather","Tracey Wintrip","Hannah Hay","Wendy Halliday","Diane Bainbridge","Fiona Gibbs","Claire Matthews","Wendy Elliot","Lily Barber","Sharon Brown","Stephanie Jackson""Alayna Jefferson","Michelle Wakensahw","Suzanne English","Gemma Jagger","Beth Hall","Stacey Patton","Dylan Gaish","Nicola Flowers","Gill Oades","Zara Rosellini","Megan Roberts","Eve Morley","Ellie Erskine","Summer Palmer","Natalie Best","Leah Beveridge","Scarlett Mattock","Marie Jacques","Cristy Wailes","Sarah Jones","Kerry Cochrane","Maddie Bailey","Ann Brodie","Anne Wilson","Laura Barnfather","Colleen Gascoigne","Jessica Dixon","Steven Douglass","Sian Harrison","Shannon Cuffe-Jones","Jade Britton","Victoria Skoyles","Emma Wright","Ellis Matthews","Ellie Murray","Claire Campbell","Amy Flanagan","Jan Rix","Michelle Ormond","Lisa Irving","Katie Kinchella","Doreen Bailey","Emma Thompson","Jill Osborne","Suzanne Middlemiss","Alison Isbister","Louise Moyle","Suzanne Greenaway","Barbara Dickinson","Aimee Jackson","Summer Glen","Judith Wilson","Vicky Gordon","Poppy Arnold","Jessica Bailey","Beth Masters","Lynsey Wilkinson","Ellie Straker-Stroud","Allison Keenan","Laurel Wood"],
  movies: ["The Godfather","Goodfellas","Jaws","Pulp Fiction","Star Wars","The Dark Knight","Inception","Gladiator","Jurassic Park","Casino"]
};

let gameTitles = {
  work: "RMS Hunks",
  tvshows: "TV Show Legends",
  movies: "Movie Classics"
};

let params = new URLSearchParams(window.location.search);
let gameType = params.get("game") || "work";
let allnames = games[gameType] || games["work"];
document.querySelector("h1").innerText = gameTitles[gameType] || "Blind Rank Game";

let names = [];
let shuffled = [];
let current = 0;
let rankings = {};

function getRandomNames(list,count){return [...list].sort(()=>Math.random()-0.5).slice(0,count);}
function shuffle(array){return array.sort(()=>Math.random()-0.5);}

function start(){
  names = getRandomNames(allnames,10);
  shuffled = [...names].sort(()=>Math.random()-0.5);
  current=0;
  rankings={};
  renderSlots();
  showName();
}

function renderSlots(){
  let html="";
  for(let i=1;i<=names.length;i++){
    html+=`<div class="slot" id="slot${i}" onclick="rank(${i})">${i}</div>`;
  }
  document.getElementById("rankings").innerHTML=html;
}

function showName(){
  if(current>=shuffled.length){showResults();return;}
  document.getElementById("card").innerText=shuffled[current];
  document.getElementById("progress").innerText=`Name ${current+1} of ${names.length}`;
}

function rank(position){
  if(rankings[position]) return;
  let name=shuffled[current];
  rankings[position]=name;
  let slot=document.getElementById("slot"+position);
  slot.classList.add("filled");
  slot.innerText=position+". "+name;
  current++;
  showName();
}

function showResults(){
  document.getElementById("card").innerText="Final Ranking";
  document.querySelectorAll(".slot").forEach((slot,i)=>{
    let pos=i+1;
    slot.innerText=pos+". "+rankings[pos];
  });
  document.getElementById("progress").innerText="Finished";
}

function shareResult(){
  const tempDiv=document.createElement("div");
  tempDiv.style.position="absolute";
  tempDiv.style.left="-9999px";
  tempDiv.style.background="#001a26";
  tempDiv.style.color="#00ffff";
  tempDiv.style.padding="30px";
  tempDiv.style.borderRadius="15px";
  tempDiv.style.fontFamily="Arial,sans-serif";
  tempDiv.style.textAlign="center";
  tempDiv.style.width="400px";

  const title=document.createElement("h2");
  title.innerText="🏆 BLIND RANK RESULTS";
  tempDiv.appendChild(title);

  const subtitle=document.createElement("div");
  subtitle.innerText=gameTitles[gameType]||gameType;
  subtitle.style.fontSize="18px";
  subtitle.style.marginTop="5px";
  subtitle.style.opacity="0.8";
  tempDiv.appendChild(subtitle);

  const list=document.createElement("div");
  list.style.marginTop="20px";
  list.style.fontSize="20px";
  for(let i=1;i<=names.length;i++){
    const item=document.createElement("div");
    const emoji=i===10?"🔟":i+"️⃣";
    item.innerText=`${emoji} ${rankings[i]||""}`;
    item.style.margin="5px 0";
    list.appendChild(item);
  }
  tempDiv.appendChild(list);
  document.body.appendChild(tempDiv);

  html2canvas(tempDiv).then(canvas=>{
    const link=document.createElement("a");
    link.download="blind-rank-result.png";
    link.href=canvas.toDataURL();
    link.click();
    tempDiv.remove();
  });
}

function restart(){start();}
start();
</script>
</body>
</html>
